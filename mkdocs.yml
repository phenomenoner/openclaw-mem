site_name: openclaw-mem
site_description: The AI agent memory layer you can audit — local-first memory governance for AI agents with citations, trust policies, trace receipts, and rollback. SQLite, sidecar-first, OpenClaw plugin.
site_url: https://phenomenoner.github.io/openclaw-mem/
repo_url: https://github.com/phenomenoner/openclaw-mem
repo_name: phenomenoner/openclaw-mem

# GitHub Pages builds from MkDocs' docs_dir. We keep it clean and point it to ./docs.
docs_dir: docs

# Keep maintainer planning packets and internal specs out of the rendered public site.
# They can remain in git for history, but first-time evaluators should not hit them
# through site search or direct docs URLs.
exclude_docs: |
  launch/**
  specs/**
  2026-*.md
  context-pack-auto-graph-*.md
  context-packing-*.md
  snippets/**
  series/**
  portfolio/**
  *.txt
  !llms.txt
  context-supply-chain-blueprint.md
  context-bloat-mitigation-rollout.md
  context-budget-sidecar-v0-receipt.md
  context-engineering-lessons.md
  rerank-poc-plan.md
  releases-v1.6.0.md
  project-management/**

theme:
  name: material
  icon:
    logo: material/database-check
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/landing.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/phenomenoner/openclaw-mem
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/openclaw-context-pack/

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

