site_name: openclaw-mem
site_description: Local-first memory sidecar + optional hybrid memory engine for OpenClaw
site_url: https://phenomenoner.github.io/openclaw-mem/
repo_url: https://github.com/phenomenoner/openclaw-mem
repo_name: phenomenoner/openclaw-mem

# GitHub Pages builds from MkDocs' docs_dir. We keep it clean and point it to ./docs.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - About: about.md
  - Choose an install path: install-modes.md
  - Quickstart: quickstart.md
  - Reality check & status: reality-check.md
  - Showcase:
      - Inside-Out demo: showcase/inside-out-demo.md
      - Topology demo: showcase/topology-demo.md
  - Releases: https://github.com/phenomenoner/openclaw-mem/releases
  - Reference:
      - Ecosystem fit: ecosystem-fit.md
      - Deployment: deployment.md
      - Auto-capture (sidecar plugin): auto-capture.md
      - Mem Engine (slot backend): mem-engine.md
      - Engine admin ops: mem-engine-admin-ops.md
      - Architecture: architecture.md
      - Context pack: context-pack.md
      - Agent memory skill (SOP): agent-memory-skill.md
      - Agent memory skill cards: agent-memory-skill-cards.md
      - Importance grading: importance-grading.md
      - Automation status: automation-status.md
      - Roadmap: roadmap.md
      - Completeness roadmap: completeness-roadmap.md
      - Dual-language memory strategy: dual-language-memory-strategy.md
      - Upgrade checklist: upgrade-checklist.md
      - Thought-links: thought-links.md
      - Privacy/export rules: privacy-export-rules.md
      - Obsidian: obsidian.md
      - Obsidian durable graph: obsidian_durable_graph.md
      - Release checklist (repo rule): release-checklist.md
  - Specs:
      - Agent memory skill (blueprint v0): specs/agent-memory-skill-v0.md
      - Topology knowledge (L3 blueprint v0): specs/topology-knowledge-v0.md
      - Docs memory (hybrid search v0): specs/docs-memory-hybrid-search-v0.md
      - Context budget sidecar (v0): specs/context-budget-sidecar-v0.md
      - Episodic events ledger (v0): specs/episodic-events-ledger-v0.md
      - Episodic auto-capture (v0): specs/episodic-auto-capture-v0.md
      - Graphic memory (GraphRAG-lite PRD): specs/graphic-memory-graphrag-lite-prd.md
      - Graphic memory auto-capture / auto-recall: specs/graphic-memory-auto-capture-auto-recall.md
      - Graphic memory preflight trigger policy: specs/graphic-memory-preflight-trigger-policy.md
      - Graphic memory query plane (v0): specs/graphic-memory-query-plane-v0.md
      - Mem-engine versioning safety net: specs/mem-engine-versioning-safety-net-v0.md
      - Topology auto-extract (v0): specs/topology-auto-extract-v0.md
      - Self-optimizing memory loop (v0): specs/self-optimizing-memory-loop-v0.md
  - Archive:
      - Archive home: archive/README.md
      - Decisions (historical): archive/decisions/README.md
      - Thought-links (historical): archive/thought-links/README.md
      - Notes (historical): archive/notes/README.md
      - Adapter spec (v0.5.9, archived): v0.5.9-adapter-spec.md
