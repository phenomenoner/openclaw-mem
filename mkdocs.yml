site_name: openclaw-mem
site_description: Trust-aware context packing + review-gated memory hygiene (sidecar-first) for OpenClaw
site_url: https://phenomenoner.github.io/openclaw-mem/
repo_url: https://github.com/phenomenoner/openclaw-mem
repo_name: phenomenoner/openclaw-mem

# GitHub Pages builds from MkDocs' docs_dir. We keep it clean and point it to ./docs.
docs_dir: docs

# Keep maintainer planning packets and internal specs out of the rendered public site.
# They can remain in git for history, but first-time evaluators should not hit them
# through site search or direct docs URLs.
exclude_docs: |
  launch/**
  specs/**
  2026-*.md
  context-pack-auto-graph-*.md
  context-packing-*.md
  snippets/**
  series/**
  portfolio/**
  *.txt
  context-supply-chain-blueprint.md
  context-bloat-mitigation-rollout.md
  context-budget-sidecar-v0-receipt.md
  context-engineering-lessons.md
  rerank-poc-plan.md
  releases-v1.6.0.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/landing.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Traditional Chinese (zh-Hant): zh/index.md
  - Start here:
      - Trust-policy synthetic proof: showcase/trust-policy-synthetic-proof.md
      - Evaluator path: evaluator-path.md
      - Core vs Advanced Labs: core-vs-advanced-labs.md
      - 60-second reality proof: reality-check.md
      - Quickstart: quickstart.md
      - Choose an install path: install-modes.md
      - Automation status: automation-status.md
  - Why openclaw-mem still exists: why-openclaw-mem-still-exists.md
  - OpenClaw 2026.4.15 comparison: openclaw-2026-4-15-comparison.md
  - About: about.md
  - Proactive Pack: proactive-pack.md
  - Showcase:
      - Trust-policy synthetic proof: showcase/trust-policy-synthetic-proof.md
      - LongMemEval_s retrieval slice: showcase/longmemeval-s-retrieval-slice.md
      - Trust-aware pack proof: showcase/trust-aware-context-pack-proof.md
      - Trust-aware proof artifacts: showcase/artifacts/index.md
      - Inside-Out demo: showcase/inside-out-demo.md
      - Topology demo: showcase/topology-demo.md
  - Releases: https://github.com/phenomenoner/openclaw-mem/releases
  - Reference:
      - Ecosystem fit: ecosystem-fit.md
      - Deployment: deployment.md
      - Auto-capture (sidecar plugin): auto-capture.md
      - Mem Engine (slot backend): mem-engine.md
      - Engine admin ops: mem-engine-admin-ops.md
      - Architecture: architecture.md
      - Context pack: context-pack.md
      - Agent memory skill (SOP): agent-memory-skill.md
      - Importance grading: importance-grading.md
      - Automation status: automation-status.md
      - Product-facing improvement roadmap: openclaw-user-improvement-roadmap.md
      - Privacy/export rules: privacy-export-rules.md
  - Advanced Labs:
      - Core vs Advanced Labs: core-vs-advanced-labs.md
      - Governed optimize assist: optimize-assist.md
      - Verbatim semantic lane: verbatim-semantic-lane.md
      - Dual-language memory strategy: dual-language-memory-strategy.md
      - Obsidian: obsidian.md
      - Obsidian durable graph: obsidian_durable_graph.md
      - Roadmap: roadmap.md
      - Completeness roadmap: completeness-roadmap.md
      - Upgrade checklist: upgrade-checklist.md
