site_name: openclaw-mem
site_description: Trust-aware context packing + review-gated memory hygiene (sidecar-first) for OpenClaw
site_url: https://phenomenoner.github.io/openclaw-mem/
repo_url: https://github.com/phenomenoner/openclaw-mem
repo_name: phenomenoner/openclaw-mem

# GitHub Pages builds from MkDocs' docs_dir. We keep it clean and point it to ./docs.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/landing.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Traditional Chinese (zh-Hant): zh/index.md
